<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Telatro — Launcher</title>
    <style>
      :root {
        --card: #0b1220;
        --muted: #98a0b3;
        --accent: #7c5cff;
        --radius: 14px;
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial;
        /* background: url("theme/background.jpeg") no-repeat center center/cover; */
        color: #e6eef8;
      }

      .shader-bg {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: -2;
      }
      .shader-bg iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
      /* overlay blocks hover from reaching iframe */
      .shader-overlay {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      .launcher {
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(12px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
        text-align: center;
        width: 320px;
        animation: fadeIn 0.5s ease;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        overflow: hidden;
        margin: 0 auto 20px auto;
      }
      .logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 18px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 6px;
      }
      p {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 28px;
      }

      .btn {
        background: var(--accent);
        color: #061024;
        font-weight: 600;
        padding: 14px 24px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        font-size: 16px;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(124, 92, 255, 0.3);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>

    <!-- meta tags -->
    <meta name="description" content="Play Balatro in the web!" />
    <meta
      name="keywords"
      content="Telatro, Balatro, game launcher, web port, play Balatro, Balatro online"
    />
    <meta name="author" content="tomcat.sh" />
    <meta property="og:title" content="Telatro — Balatro Web Launcher" />
    <meta property="og:description" content="Play Balatro in the web!" />
    <meta property="og:image" content="game/theme/cover.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://telatro.tomcat.sh/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Telatro — Balatro Web Launcher" />
    <meta name="twitter:description" content="Balatro in the web!" />
    <meta name="twitter:image" content="game/theme/cover.png" />
    <link rel="icon" href="theme/icon.png" type="image/png" />
  </head>
  <body>
    <div class="shader-bg"></div>

    <div class="launcher">
      <div class="logo"><img src="theme/icon.png" alt="Telatro Icon" /></div>
      <h1>Telatro v1.4a</h1>
      <p>
        A full web port of the hit gambling game Balatro. Ad-free, tracker-free,
        and embeddable.
      </p>
      <button class="btn" onclick="location.href='game/'">Launch</button>
    </div>
    <script src="balatroBackground.js"></script>
    <script>
      const instance = new BalatroShader({
        container: ".shader-bg",
        colours: { c1: "#DE443B", c2: "#006BB4", c3: "#162325" },
        speed: 1.4,
        contrast: 2,
        spinAmount: 0.5,
        pixelSizeFac: 400,
        spinEase: 0.5,
      });
    </script>
  </body>
</html>
